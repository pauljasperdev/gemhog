name: gemhog-test

services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: gemhog-test-postgres
    environment:
      POSTGRES_DB: gemhog_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s
